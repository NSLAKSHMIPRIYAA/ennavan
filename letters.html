<!DOCTYPE html>
<html>
<head>
<title>Open When Letters</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ffe6f0,#fff5f5,#ffe9ff);
    text-align:center;
}

/* title */
h1{
    margin:25px 0;
    color:#d63384;
}

/* GRID of envelopes */
.grid{
    display:grid;
    grid-template-columns: repeat(2, 180px);
    gap:25px;
    justify-content:center;
    padding:20px;
}

/* ENVELOPE DESIGN */
.envelope-card{
    width:180px;
    height:120px;
    background:#fff;
    border-radius:10px;
    position:relative;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
    transition:0.3s;
    overflow:hidden;
}

/* flap */
.envelope-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:50%;
    background:#ffd6e8;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
}

/* label */
.tag{
    position:absolute;
    bottom:10px;
    width:100%;
    font-size:0.9rem;
    color:#5a3d5c;
}

/* hover */
.envelope-card:hover{
    transform: translateY(-5px);
}

/* POPUP */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

/* envelope open animation container */
.open-envelope{
    width:320px;
    background:#fff;
    border-radius:10px;
    position:relative;
    animation: openAnim 0.6s ease;
    overflow:hidden;
}

/* top flap animation */
.open-envelope::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:50%;
    background:#ffd6e8;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    animation: flapOpen 0.6s ease forwards;
}

/* paper */
.paper{
    margin-top:60px;
    padding:20px;
    background:#fff5f5;
    color:#5a3d5c;
    border-radius:10px;
    animation: fadeIn 0.8s ease;
}

/* close */
.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
}

/* animations */
@keyframes openAnim{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

@keyframes flapOpen{
    from{transform: rotateX(0);}
    to{transform: rotateX(180deg);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

a{
    display:inline-block;
    margin:20px;
    color:#d63384;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>💌 Open When Letters</h1>

<div class="grid">

<div class="envelope-card" onclick="openLetter('happy')">
    <div class="tag">Open when you're happy</div>
</div>

<div class="envelope-card" onclick="openLetter('sad')">
    <div class="tag">Open when you're sad</div>
</div>

<div class="envelope-card" onclick="openLetter('miss')">
    <div class="tag">Open when you miss me</div>
</div>

<div class="envelope-card" onclick="openLetter('tired')">
    <div class="tag">Open when you're tired</div>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closeLetter(event)">
    <div class="open-envelope">

        <div class="close" onclick="closeLetter(event)">✖</div>

        <div class="paper" id="paperText"></div>

    </div>
</div>

<a href="index.html">⬅ Back</a>

<script>

const messages = {
    happy: "I'm smiling because you're smiling ❤️",
    sad: "No matter what happens, I'm always here for you ❤️",
    miss: "Imagine me giving you the biggest hug right now ❤️",
    tired: "Rest okay? You mean everything to me ❤️"
};

function openLetter(type){
    document.getElementById("paperText").innerText = messages[type];
    document.getElementById("overlay").style.display = "flex";
}

function closeLetter(e){
    if(e.target.id === "overlay" || e.target.className === "close"){
        document.getElementById("overlay").style.display = "none";
    }
}

</script>

</body>
</html>
