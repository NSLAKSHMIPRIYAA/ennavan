<!DOCTYPE html>
<html>
<head>
<title>Open When Letters</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ffd6e8,#ffe8d6,#e8d6ff);
    text-align:center;
}

h1{
    margin:25px 0;
    color:#d63384;
}

.grid{
    display:grid;
    grid-template-columns: repeat(2, 160px);
    gap:25px;
    justify-content:center;
    padding:20px;
}

.envelope-card{
    width:160px;
    height:120px;
    position:relative;
    cursor:pointer;
    border-radius:14px;
    background: linear-gradient(145deg, #ffe6ef, #ffd1e1);
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    transition:0.3s;
    overflow:hidden;
}

.envelope-card::before,
.envelope-card::after{
    content:"";
    position:absolute;
    background: rgba(255,255,255,0.35);
    width:200%;
    height:2px;
    top:55%;
    left:-50%;
    transform: rotate(35deg);
}

.envelope-card::after{
    transform: rotate(-35deg);
    z-index:1;
}

.flap{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:60%;
    background: linear-gradient(145deg,#ff8fb3,#ff5f97);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#ff6b81;
    color:white;
    font-size:12px;
    padding:4px 6px;
    border-radius:50%;
}

.tag{
    position:absolute;
    bottom:10px;
    width:100%;
    font-size:0.85rem;
    color:#333;
}

.envelope-card:hover{
    transform: translateY(-6px) scale(1.02);
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.open-envelope{
    width:340px;
    background:#fff;
    border-radius:10px;
    position:relative;
    padding:25px;
    animation: pop 0.4s ease;
}

.paper{
    font-family:'Dancing Script', cursive;
    font-size:1.4rem;
    color:#2c2c2c;
    background:#fafafa;
    padding:20px;
    border-radius:10px;
    animation: fadeIn 0.5s ease;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
}

@keyframes pop{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    position:fixed;
    font-size:16px;
    animation: floatUp 1.5s linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-120px);opacity:0;}
}

a{
    display:inline-block;
    margin:20px;
    color:#333;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>💌 Open When Letters</h1>

<div class="grid">

<div class="envelope-card" onclick="openLetter('happy')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Happy</div>
</div>

<div class="envelope-card" onclick="openLetter('sad')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Sad</div>
</div>

<div class="envelope-card" onclick="openLetter('miss')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Miss me</div>
</div>

<div class="envelope-card" onclick="openLetter('tired')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Tired</div>
</div>

</div>

<!-- ✅ WORKING AUDIO (BRAVE FRIENDLY) -->
<audio id="paperSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/office/paper_rustle.ogg" type="audio/ogg">
</audio>

<div class="overlay" id="overlay" onclick="closeLetter(event)">
    <div class="open-envelope">

        <div class="close" onclick="closeLetter(event)">✖</div>

        <div class="paper" id="paperText"></div>

    </div>
</div>

<a href="index.html">⬅ Back</a>

<script>

const messages = {
    happy: "I'm smiling because you're smiling ❤️",
    sad: "No matter what happens, I'm always here for you ❤️",
    miss: "Imagine me giving you the biggest hug right now ❤️",
    tired: "Rest okay? You mean everything to me ❤️"
};

function openLetter(type){

    document.getElementById("paperText").innerText = messages[type];
    document.getElementById("overlay").style.display = "flex";

    /* AUDIO FIX FOR BRAVE */
    const sound = document.getElementById("paperSound");

    try {
        sound.pause();
        sound.currentTime = 0;
        sound.volume = 1.0;

        const playPromise = sound.play();
        if (playPromise !== undefined) {
            playPromise.catch(err => {
                console.log("Audio blocked:", err);
            });
        }
    } catch (e) {
        console.log(e);
    }

    /* HEART BURST */
    for(let i=0;i<10;i++){
        const h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"vw";
        h.style.top="60%";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),1500);
    }
}

function closeLetter(e){
    if(e.target.id==="overlay" || e.target.className==="close"){
        document.getElementById("overlay").style.display="none";
    }
}

</script>

</body>
</html>
