<!DOCTYPE html>
<html>
<head>
<title>Open When Letters</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ffd6e8,#ffe8d6,#e8d6ff);
    text-align:center;
}

h1{
    margin:25px 0;
    color:#d63384;
}

.grid{
    display:grid;
    grid-template-columns: repeat(5, 160px);
    gap:25px;
    justify-content:center;
    padding:20px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns: repeat(3, 160px);
    }
}

@media(max-width:600px){
    .grid{
        grid-template-columns: repeat(2, 160px);
    }
}

/* envelope */
.envelope-card{
    width:160px;
    height:120px;
    position:relative;
    cursor:pointer;
    border-radius:14px;
    background: linear-gradient(145deg, #ffe6ef, #ffd1e1);
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    transition:0.3s;
    overflow:hidden;
}

.envelope-card::before,
.envelope-card::after{
    content:"";
    position:absolute;
    background: rgba(255,255,255,0.35);
    width:200%;
    height:2px;
    top:55%;
    left:-50%;
    transform: rotate(35deg);
}

.envelope-card::after{
    transform: rotate(-35deg);
    z-index:1;
}

.flap{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:60%;
    background: linear-gradient(145deg,#ff8fb3,#ff5f97);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#ff6b81;
    color:white;
    font-size:12px;
    padding:4px 6px;
    border-radius:50%;
}

.tag{
    position:absolute;
    bottom:10px;
    width:100%;
    font-size:0.85rem;
    color:#333;
}

.envelope-card:hover{
    transform: translateY(-6px) scale(1.02);
}

/* popup */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.open-envelope{
    width:340px;
    background:#fff;
    border-radius:10px;
    position:relative;
    padding:25px;
    animation: pop 0.4s ease;
}

.paper{
    font-family:'Dancing Script', cursive;
    font-size:1.4rem;
    color:#2c2c2c;
    background:#fafafa;
    padding:20px;
    border-radius:10px;
    animation: fadeIn 0.5s ease;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
}

@keyframes pop{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    position:fixed;
    font-size:16px;
    animation: floatUp 1.5s linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-120px);opacity:0;}
}

a{
    display:inline-block;
    margin:20px;
    color:#333;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>💌 Open When Letters</h1>



<div class="grid">

<div class="envelope-card" onclick="openLetter('happy')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Happy</div>
</div>

<div class="envelope-card" onclick="openLetter('sad')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Sad</div>
</div>

<div class="envelope-card" onclick="openLetter('miss')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Miss me</div>
</div>

<div class="envelope-card" onclick="openLetter('tired')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Tired</div>
</div>

<div class="envelope-card" onclick="openLetter('angry')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Angry</div>
</div>

<div class="envelope-card" onclick="openLetter('stressed')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Stressed</div>
</div>

<div class="envelope-card" onclick="openLetter('motivation')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Motivation</div>
</div>

<div class="envelope-card" onclick="openLetter('sleep')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Can't Sleep</div>
</div>

<div class="envelope-card" onclick="openLetter('lonely')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Lonely</div>
</div>

<div class="envelope-card" onclick="openLetter('hug')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Need A Hug</div>
</div>

<div class="envelope-card" onclick="openLetter('doubt')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Doubt Yourself</div>
</div>

<div class="envelope-card" onclick="openLetter('fight')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">We Had A Fight</div>
</div>

<div class="envelope-card" onclick="openLetter('unloved')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Unloved</div>
</div>

<div class="envelope-card" onclick="openLetter('insecure')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Insecure</div>
</div>

<div class="envelope-card" onclick="openLetter('smile')">
    <div class="flap"></div>
    <div class="badge">❤</div>
    <div class="tag">Need A Smile</div>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closeLetter(event)">
    <div class="open-envelope">

        <div class="close" onclick="closeLetter(event)">✖</div>
        <div class="paper" id="paperText"></div>

    </div>
</div>
<div class="envelope-card"
     id="secretEnvelope"
     onclick="openLetter('secret')"
     style="display:none;">

    <div class="flap"></div>
    <div class="badge">✨</div>
    <div class="tag">Final Letter</div>

</div>

<!-- 🔊 YOUR LOCAL MP3 -->
<audio id="paperSound" preload="auto">
    <source src="paper2.mp3" type="audio/mpeg">
</audio>



<script>
let openedLetters = new Set();

const messages = {
    happy: "I'm so glad you're smiling right now. You deserve every bit of happiness that's coming your way. Please take a moment to be proud of yourself. And if possible, save one of those cute smiles for me too. ❤️",

    sad: "Hey, it's okay to not be okay sometimes. You don't always have to be strong or have everything figured out. Whatever is hurting you right now, you don't have to carry it alone. I'm always here, cheering for you and caring about you. ❤️",

    miss: "Missing me, huh? 😌 Good, because I probably miss you more than you miss me. Imagine me sitting next to you, stealing your attention and annoying you lovingly. Until we meet again, consider this letter a tiny piece of me. ❤️",

    tired: "You've been trying so hard lately. Take a break and give yourself permission to rest. The world can wait for a little while. Drink some water, relax your shoulders, and breathe. ❤️",

    angry: "I know you're upset right now. Before you do anything dramatic, take a deep breath for me. You're allowed to feel angry, but don't let the moment decide everything. We'll get through this one way or another. ❤️",

    stressed: "One task at a time. One breath at a time. You don't have to solve every problem today. You're stronger and more capable than you give yourself credit for. ❤️",

    motivation: "Remember all the things you once thought you couldn't do? Look at you now. You've already overcome so much. Don't stop because you're tired—rest, then continue. ❤️",

    sleep: "Hi sleepyhead. 😴 I know your brain is probably running a marathon right now. Close your eyes and let your thoughts slow down. Tomorrow can wait. Right now, just rest. ❤️",

    lonely: "I know being alone can feel heavy sometimes. But I hope you remember that you are loved more than you realize. Distance doesn't change how much you mean to me. You're always in my thoughts and my heart. ❤️",

    hug: "This letter comes with the biggest virtual hug ever. Imagine me wrapping my arms around you and refusing to let go. No words, no advice. Just a warm hug and a reminder that I care about you. ❤️",

    doubt: "I wish you could see yourself through my eyes. You'd see someone kind, capable, and genuinely special. The things you're insecure about don't define you. You are so much more than your doubts. ❤️",

    fight: "If you're reading this, we've probably annoyed each other. 😅 But one disagreement could never erase everything we have. I'd rather work through a hundred problems with you than lose you over one. We'll be okay. We always find our way back. ❤️",

    unloved: "In case your brain is being mean to you today, let me remind you of something important. You are loved. Deeply, genuinely, and wholeheartedly. Not for what you do, but simply for who you are. ❤️",

    insecure: "Hey. You don't need to be perfect to be worthy of love. You don't need to change yourself to deserve kindness. You are already enough, exactly as you are. ❤️",

    smile: "Quick reminder: you've survived every embarrassing thing you've ever done. Including that one thing you're thinking about right now. See? Life isn't that bad. Now smile, you goofball. 😂❤️",

    secret: "If you're reading this, you've opened every letter. Maybe you were curious. Maybe you were bored. Or maybe you just wanted to see everything I wrote for you. Whatever the reason, thank you. Out of all the people I could have met, I met you. Out of all the memories I could have made, some of my favorites include you. And if there's one thing I hope you take away from this little gift, it's this: You are loved. More than you know. More than these letters can ever fully say. ❤️"

    
};
function openLetter(type){

    document.getElementById("paperText").innerText = messages[type];
    document.getElementById("overlay").style.display = "flex";

    /* PAPER SOUND */
    const sound = document.getElementById("paperSound");

    sound.currentTime = 0;

    sound.play().catch(err => {
        console.log("Audio error:", err);
    });

    /* Track opened letters */
    if(type !== "secret"){
        openedLetters.add(type);

        if(openedLetters.size === 15){
            document.getElementById("secretEnvelope").style.display = "block";

            setTimeout(() => {
                alert("❤️ You've opened every letter. One final letter has appeared.");
            }, 300);
        }
    }

    /* Hearts */
    for(let i=0;i<10;i++){
        const h = document.createElement("div");

        h.className = "heart";
        h.innerHTML = "❤️";

        h.style.left = Math.random()*100 + "vw";
        h.style.top = "60%";

        document.body.appendChild(h);

        setTimeout(() => h.remove(), 1500);
    }
}
function closeLetter(e){
    if(e.target.id==="overlay" || e.target.className==="close"){
        document.getElementById("overlay").style.display="none";
    }
}


</script>

</body>
</html>
