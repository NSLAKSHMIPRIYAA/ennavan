<!DOCTYPE html>
<html>
<head>
<title>Open When Letters</title>

<!-- handwriting font -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f6f6f6;
    text-align:center;
}

/* title */
h1{
    margin:25px 0;
    color:#333;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(2, 180px);
    gap:25px;
    justify-content:center;
    padding:20px;
}

/* REALISTIC ENVELOPE */
.envelope-card{
    width:180px;
    height:120px;
    background:#fff;
    border-radius:6px;
    position:relative;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    overflow:hidden;
    transition:0.3s;
}

/* yellow flap */
.envelope-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:55%;
    background:#f4d03f;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
}

/* subtle inner fold line */
.envelope-card::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:2px;
    background:rgba(0,0,0,0.08);
}

/* label */
.tag{
    position:absolute;
    bottom:10px;
    width:100%;
    font-size:0.85rem;
    color:#333;
}

/* hover */
.envelope-card:hover{
    transform: translateY(-4px);
}

/* POPUP */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

/* opened envelope */
.open-envelope{
    width:340px;
    background:#fff;
    border-radius:8px;
    position:relative;
    padding-top:40px;
    animation: pop 0.4s ease;
}

/* flap animation */
.open-envelope::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#f4d03f;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    animation: flap 0.5s ease forwards;
}

/* letter paper */
.paper{
    font-family:'Dancing Script', cursive;
    font-size:1.3rem;
    color:#2c2c2c;
    padding:25px;
    background:#fafafa;
    border-radius:8px;
    margin:20px;
    animation: fadeIn 0.6s ease;
}

/* close */
.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
}

/* animations */
@keyframes pop{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

@keyframes flap{
    from{transform:rotateX(0deg);}
    to{transform:rotateX(180deg);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

a{
    display:inline-block;
    margin:20px;
    color:#333;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>💌 Open When Letters</h1>

<div class="grid">

<div class="envelope-card" onclick="openLetter('happy')">
    <div class="tag">Open when you're happy</div>
</div>

<div class="envelope-card" onclick="openLetter('sad')">
    <div class="tag">Open when you're sad</div>
</div>

<div class="envelope-card" onclick="openLetter('miss')">
    <div class="tag">Open when you miss me</div>
</div>

<div class="envelope-card" onclick="openLetter('tired')">
    <div class="tag">Open when you're tired</div>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closeLetter(event)">
    <div class="open-envelope">

        <div class="close" onclick="closeLetter(event)">✖</div>

        <div class="paper" id="paperText"></div>

    </div>
</div>

<!-- audio -->
<audio id="paperSound" src="https://www.soundjay.com/paper/sounds/paper-rustle-1.mp3"></audio>

<a href="index.html">⬅ Back</a>

<script>

const messages = {
    happy: "I'm smiling because you're smiling ❤️",
    sad: "No matter what happens, I'm always here for you ❤️",
    miss: "Imagine me giving you the biggest hug right now ❤️",
    tired: "Rest okay? You mean everything to me ❤️"
};

/* HEART PARTICLES */
function createHearts(){
    for(let i=0;i<12;i++){
        const h = document.createElement("div");
        h.innerHTML="❤️";
        h.style.position="fixed";
        h.style.left=Math.random()*100+"vw";
        h.style.top="50%";
        h.style.fontSize=(Math.random()*12+10)+"px";
        h.style.animation="floatUp 1.5s linear forwards";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),1500);
    }
}

/* float animation injected */
const style = document.createElement("style");
style.innerHTML=`
@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-120px);opacity:0;}
}`;
document.head.appendChild(style);

/* OPEN LETTER */
function openLetter(type){

    document.getElementById("paperText").innerText = messages[type];
    document.getElementById("overlay").style.display = "flex";

    /* sound */
    const sound = document.getElementById("paperSound");
    sound.currentTime = 0;
    sound.play();

    /* hearts */
    createHearts();
}

/* CLOSE */
function closeLetter(e){
    if(e.target.id === "overlay" || e.target.className === "close"){
        document.getElementById("overlay").style.display = "none";
    }
}

</script>

</body>
</html>
