<!DOCTYPE html>
<html>
<head>
<title>Open When Letters</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ffe6f0,#fff5f5,#ffe9ff);
    text-align:center;
}

/* title */
h1{
    margin:30px 0;
    color:#d63384;
}

/* GRID layout */
.grid{
    display:grid;
    grid-template-columns: repeat(2, minmax(150px, 1fr));
    gap:20px;
    max-width:600px;
    margin:0 auto;
    padding:20px;
}

/* letter cards */
.card{
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    transition:0.3s;
    font-size:1rem;
    color:#5a3d5c;
}

.card:hover{
    transform: translateY(-5px);
}

/* POPUP overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

/* envelope */
.envelope{
    width:320px;
    background:#fff;
    border-radius:15px;
    padding:20px;
    position:relative;
    animation: pop 0.4s ease;
}

/* paper inside */
.paper{
    background:#fff5f5;
    padding:15px;
    border-radius:10px;
    color:#5a3d5c;
    animation: fadeIn 0.5s ease;
}

/* close button */
.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
}

/* animations */
@keyframes pop{
    from{
        transform:scale(0.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

a{
    display:inline-block;
    margin:20px;
    color:#d63384;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>💌 Open When Letters</h1>

<div class="grid">

<div class="card" onclick="openLetter('happy')">
Open When You're Happy
</div>

<div class="card" onclick="openLetter('sad')">
Open When You're Sad
</div>

<div class="card" onclick="openLetter('miss')">
Open When You Miss Me
</div>

<div class="card" onclick="openLetter('tired')">
Open When You're Tired
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closeLetter(event)">
    <div class="envelope">

        <div class="close" onclick="closeLetter(event)">✖</div>

        <div class="paper" id="paperText">
        </div>

    </div>
</div>

<a href="index.html">⬅ Back</a>

<script>

const messages = {
    happy: "I'm smiling because you're smiling ❤️",
    sad: "No matter what happens, I'm always here for you ❤️",
    miss: "Imagine me giving you the biggest hug right now ❤️",
    tired: "Rest okay? You mean everything to me ❤️"
};

function openLetter(type){
    document.getElementById("paperText").innerText = messages[type];
    document.getElementById("overlay").style.display = "flex";
}

function closeLetter(e){
    if(e.target.id === "overlay" || e.target.className === "close"){
        document.getElementById("overlay").style.display = "none";
    }
}

</script>

</body>
</html>
