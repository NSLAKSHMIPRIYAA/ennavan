<!DOCTYPE html>
<html>
<head>
<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#ffd6e8,
#fff0d6,
#e8d6ff
);

overflow:hidden;
}

/* BOOK */

.book{
position:relative;
width:900px;
height:600px;
perspective:2500px;
}

/* COVER */

.cover{
position:absolute;
width:100%;
height:100%;

background:
linear-gradient(
135deg,
#ff8db2,
#ffb7cf
);

border-radius:12px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;

box-shadow:
0 20px 40px rgba(0,0,0,.3);

z-index:100;
}

.cover h1{
font-size:50px;
}

.cover p{
margin-top:20px;
font-size:22px;
}

.badge{
margin-top:30px;

background:gold;
color:#7a0018;

padding:12px 25px;

border-radius:30px;

font-weight:bold;
}

/* PAGE */

.page{
position:absolute;

width:100%;
height:100%;

transform-style:preserve-3d;
transform-origin:left center;

transition:transform 1.2s ease;

cursor:pointer;
}

.page.flipped{
transform:rotateY(-180deg);
}

.front,
.back{

position:absolute;

width:100%;
height:100%;

backface-visibility:hidden;

background:#fffdf7;

border-radius:10px;

overflow:hidden;

box-shadow:
0 10px 25px rgba(0,0,0,.15);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.back{
transform:rotateY(180deg);
}

/* PAPER TEXTURE */

.front::before,
.back::before{

content:"";

position:absolute;
inset:0;

background:
repeating-linear-gradient(
0deg,
transparent,
transparent 24px,
rgba(0,0,0,.03) 25px
);

pointer-events:none;
}

/* CONTENT */

.page img{
width:70%;
max-height:320px;

object-fit:cover;

border-radius:12px;

box-shadow:
0 6px 18px rgba(0,0,0,.2);

margin-bottom:20px;
}

.caption{
width:80%;

text-align:center;

font-size:20px;

line-height:1.6;

color:#555;

z-index:2;
}

/* BUTTONS */

.controls{

position:fixed;

bottom:40px;

display:flex;

gap:20px;
}

button{

padding:15px 30px;

border:none;

border-radius:30px;

background:white;

font-size:18px;

cursor:pointer;

box-shadow:
0 5px 15px rgba(0,0,0,.2);

transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="book">

<!-- COVER -->

<div class="cover" id="cover">

<h1>📖 Our Story</h1>

<p>Priyaa ❤️ Akash</p>

<div class="badge">
⭐ No.1 Bestselling Love Story
</div>

</div>

<!-- PAGE 1 -->

<div class="page" id="page1">

<div class="front">

<img src="page1.jpg">

<div class="caption">
Chapter 1 ❤️<br>
Where everything began.
</div>

</div>

<div class="back">

<img src="page2.jpg">

<div class="caption">
The first pages of our story.
</div>

</div>

</div>

<!-- PAGE 2 -->

<div class="page" id="page2">

<div class="front">

<img src="page3.jpg">

<div class="caption">
A memory I never want to forget.
</div>

</div>

<div class="back">

<img src="page4.jpg">

<div class="caption">
One more beautiful chapter.
</div>

</div>

</div>

<!-- PAGE 3 -->

<div class="page" id="page3">

<div class="front">

<img src="page5.jpg">

<div class="caption">
The adventures continue...
</div>

</div>

<div class="back">

<img src="page6.jpg">

<div class="caption">
To be continued ❤️
</div>

</div>

</div>

</div>

<div class="controls">

<button onclick="prevPage()">
⬅ Previous
</button>

<button onclick="nextPage()">
Next ➡
</button>

</div>

<script>

let current=0;

const cover=document.getElementById("cover");

const pages=[
document.getElementById("page1"),
document.getElementById("page2"),
document.getElementById("page3")
];

function nextPage(){

if(current===0){

cover.style.display="none";
current++;
return;
}

if(current<=pages.length){

pages[current-1].classList.add("flipped");
current++;
}

}

function prevPage(){

if(current===1){

cover.style.display="flex";
current=0;
return;
}

if(current>1){

current--;

pages[current-1].classList.remove("flipped");

}

}

</script>

</body>
</html>
