<!DOCTYPE html>
<html>
<head>

<title>Memories</title>

<style>

body{
    margin:0;
    font-family:Arial;
    overflow-x:hidden;

    /* corkboard base */
    background:
    radial-gradient(circle at 20% 20%, #c68b59 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #b97a4a 0%, transparent 45%),
    radial-gradient(circle at 40% 80%, #a86b3d 0%, transparent 50%),
    linear-gradient(135deg, #d49a6a, #b87445);
}

/* cork texture grain */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    /* 🎯 cork grain + scratches + holes combined */
    background:

    /* cork holes */
    radial-gradient(circle at 20% 20%, rgba(0,0,0,0.08) 1px, transparent 2px),
    radial-gradient(circle at 80% 30%, rgba(0,0,0,0.06) 1px, transparent 2px),
    radial-gradient(circle at 40% 80%, rgba(0,0,0,0.05) 1px, transparent 2px),

    /* scratches */
    linear-gradient(115deg,
        transparent 48%,
        rgba(0,0,0,0.07) 49%,
        transparent 50%),

    linear-gradient(65deg,
        transparent 48%,
        rgba(255,255,255,0.04) 49%,
        transparent 50%),

    /* fine grain */
    radial-gradient(rgba(0,0,0,0.06) 1px, transparent 2px);

    background-size:
    140px 140px,
    200px 200px,
    160px 160px,
    90px 90px,
    100px 100px,
    6px 6px;

    opacity:0.35;
}
/* vignette for depth */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    background:radial-gradient(
        circle at center,
        transparent 40%,
        rgba(0,0,0,0.35) 100%
    );
}

h1{
    text-align:center;
    margin-top:30px;
    color:#c94f7c;
}

/* WALL */

#wall{
    position:relative;
    width:100%;
    min-height:1900px;
}

/* polaroids */
.polaroid{
    position:absolute;
    width:180px;
    background:#fffdf8;
    padding:12px 12px 40px;
    box-shadow:0 8px 20px rgba(0,0,0,0.35);
    cursor:pointer;
    transition:.25s;

    transform-origin: top center;
}

/* 📌 PIN (new top center dot) */
.polaroid::before{
    content:"";
    position:absolute;
    top:-8px;
    left:50%;
    transform:translateX(-50%);

    width:14px;
    height:14px;
    border-radius:50%;

    background:radial-gradient(circle at 30% 30%, #ff4d6d, #7a0018);

    box-shadow:
    0 3px 6px rgba(0,0,0,0.5),
    inset -2px -2px 3px rgba(0,0,0,0.25);
}
.polaroid:hover{
    transform:scale(1.06) rotate(0deg);
    z-index:100;
    box-shadow:0 15px 30px rgba(0,0,0,0.45);
}

.polaroid img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.polaroid p{
    text-align:center;
    font-weight:bold;
}

/* positions */
.p1{top:80px;left:8%;transform:rotate(-6deg);}
.p2{top:120px;left:38%;transform:rotate(5deg);}
.p3{top:80px;right:8%;transform:rotate(-4deg);}
.p4{top:420px;left:10%;transform:rotate(6deg);}
.p5{top:460px;left:40%;transform:rotate(-5deg);}
.p6{top:420px;right:10%;transform:rotate(4deg);}
.p7{top:760px;left:8%;transform:rotate(-7deg);}
.p8{top:800px;left:38%;transform:rotate(6deg);}
.p9{top:760px;right:8%;transform:rotate(-5deg);}
.p10{top:1100px;left:10%;transform:rotate(5deg);}
.p11{top:1140px;left:40%;transform:rotate(-6deg);}
.p12{top:1100px;right:10%;transform:rotate(4deg);}
.p13{top:1450px;left:12%;transform:rotate(-5deg);}
.p14{top:1490px;left:42%;transform:rotate(6deg);}
.p15{top:1450px;right:12%;transform:rotate(-4deg);}

/* SCRAPBOOK */

#scrapbook{
    display:none;
    position:fixed;
    inset:0;

    background:linear-gradient(
        135deg,
        rgba(255,225,236,0.97),
        rgba(255,241,220,0.97)
    );

    justify-content:center;
    align-items:center;
    z-index:999;
}

.page{
    position:relative;
    width:750px;
    max-width:90%;

    background:
    repeating-linear-gradient(
        0deg,
        #fff8e7,
        #fff8e7 24px,
        #f3e7d3 25px
    );

    padding:35px;
    border-radius:20px;
    text-align:center;

    overflow:hidden;
}

/* tape FIXED (now visible above everything) */
.tape{
    position:absolute;
    width:90px;
    height:25px;
    background:rgba(255,255,180,0.85);
    z-index:5;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.t1{top:10px;left:140px;transform:rotate(-15deg);}
.t2{top:10px;right:140px;transform:rotate(15deg);}

/* photo */
#memoryPhoto{
    width:75%;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
    margin-top:20px;
}

/* text */
#memoryTitle{
    color:#c94f7c;
}

#memoryCaption{
    line-height:1.8;
    margin-top:15px;
}

/* button */
.backBtn{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    background:#ffb6c1;
    border-radius:10px;
    cursor:pointer;
}

/* doodles container (now dynamic, not fixed emojis) */
.doodle{
    position:absolute;
    font-size:18px;
    opacity:0.8;
}
.fairy-lights{
    position:absolute;
    top:40px;
    left:0;
    width:100%;
    height:1800px;
    pointer-events:none;
    z-index:2;
    background:
linear-gradient(white,white) 15% 85px/20% 2px no-repeat,
linear-gradient(white,white) 35% 135px/20% 2px no-repeat,
linear-gradient(white,white) 55% 95px/20% 2px no-repeat,

linear-gradient(white,white) 20% 455px/30% 2px no-repeat,
linear-gradient(white,white) 50% 525px/30% 2px no-repeat,

linear-gradient(white,white) 15% 855px/25% 2px no-repeat,
linear-gradient(white,white) 40% 905px/30% 2px no-repeat,

linear-gradient(white,white) 20% 1205px/30% 2px no-repeat,
linear-gradient(white,white) 50% 1255px/30% 2px no-repeat,

linear-gradient(white,white) 25% 1555px/30% 2px no-repeat;
    background-repeat:no-repeat;
}

.light{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;

    background:#ffd86b;

    box-shadow:
        0 0 8px #ffd86b,
        0 0 15px #ffd86b,
        0 0 25px #ffd86b;

    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.5;}
    to{opacity:1;}
}


</style>
</head>

<body>

<h1>📸 Our Little Memory Wall ❤️</h1>

<div id="wall">
<div class="fairy-lights">

<div class="light" style="top:80px;left:15%;"></div>
<div class="light" style="top:130px;left:35%;"></div>
<div class="light" style="top:90px;left:55%;"></div>
<div class="light" style="top:140px;left:75%;"></div>

<div class="light" style="top:450px;left:20%;"></div>
<div class="light" style="top:520px;left:50%;"></div>
<div class="light" style="top:470px;left:80%;"></div>

<div class="light" style="top:850px;left:15%;"></div>
<div class="light" style="top:900px;left:40%;"></div>
<div class="light" style="top:850px;left:70%;"></div>

<div class="light" style="top:1200px;left:20%;"></div>
<div class="light" style="top:1250px;left:50%;"></div>
<div class="light" style="top:1200px;left:80%;"></div>

<div class="light" style="top:1550px;left:25%;"></div>
<div class="light" style="top:1600px;left:55%;"></div>
<div class="light" style="top:1550px;left:80%;"></div>

</div>
<div class="polaroid p1" onclick="openMemory(0)"><img src="pic1.jpg"><p>Memory 1</p></div>
<div class="polaroid p2" onclick="openMemory(1)"><img src="pic2.jpg"><p>Memory 2</p></div>
<div class="polaroid p3" onclick="openMemory(2)"><img src="pic3.jpg"><p>Memory 3</p></div>
<div class="polaroid p4" onclick="openMemory(3)"><img src="pic4.jpg"><p>Memory 4</p></div>
<div class="polaroid p5" onclick="openMemory(4)"><img src="pic5.jpg"><p>Memory 5</p></div>

<div class="polaroid p6" onclick="openMemory(5)"><img src="pic1.jpg"><p>Memory 6</p></div>
<div class="polaroid p7" onclick="openMemory(6)"><img src="pic1.jpg"><p>Memory 7</p></div>
<div class="polaroid p8" onclick="openMemory(7)"><img src="pic1.jpg"><p>Memory 8</p></div>
<div class="polaroid p9" onclick="openMemory(8)"><img src="pic1.jpg"><p>Memory 9</p></div>
<div class="polaroid p10" onclick="openMemory(9)"><img src="pic1.jpg"><p>Memory 10</p></div>
<div class="polaroid p11" onclick="openMemory(10)"><img src="pic1.jpg"><p>Memory 11</p></div>
<div class="polaroid p12" onclick="openMemory(11)"><img src="pic1.jpg"><p>Memory 12</p></div>
<div class="polaroid p13" onclick="openMemory(12)"><img src="pic1.jpg"><p>Memory 13</p></div>
<div class="polaroid p14" onclick="openMemory(13)"><img src="pic1.jpg"><p>Memory 14</p></div>
<div class="polaroid p15" onclick="openMemory(14)"><img src="pic1.jpg"><p>More ❤️</p></div>

</div>

<div id="scrapbook">

<div class="page">

<div class="tape t1"></div>
<div class="tape t2"></div>

<div id="doodlesContainer"></div>

<img id="memoryPhoto">

<h2 id="memoryTitle"></h2>
<p id="memoryCaption"></p>

<button class="backBtn" onclick="closeMemory()">⬅ Back</button>

</div>
</div>

<script>

/* 15 memories now supported */
const memories = Array.from({length:15}, (_,i)=>({
    photo:`pic${(i%5)+1}.jpg`,
    title:`Memory ${i+1} ❤️`,
    caption:`A beautiful little moment we shared ✨`
}));

/* 🎀 different doodle styles per memory */
const doodleSets = [
["✦","✿","❀","✧"],
["♡","☁","✦","✿"],
["🌷","✨","♡","☾"],
["✧","❀","✦","♡"],
["☁","✿","🌸","✧"]
];

function openMemory(index){

document.getElementById("wall").style.display="none";
document.getElementById("scrapbook").style.display="flex";

document.getElementById("memoryPhoto").src = memories[index].photo;
document.getElementById("memoryTitle").innerText = memories[index].title;
document.getElementById("memoryCaption").innerText = memories[index].caption;

/* 🌸 generate unique doodles each time */
const container = document.getElementById("doodlesContainer");
container.innerHTML = "";

const set = doodleSets[index % doodleSets.length];

set.forEach((d,i)=>{
    const el = document.createElement("div");
    el.className="doodle";
    el.innerText=d;

    el.style.top = (40 + i*60) + "px";
    el.style.left = (30 + (i%2)*600) + "px";
    el.style.fontSize = (18 + (i%3)*6) + "px";
    el.style.transform = `rotate(${(i*10)-15}deg)`;

    container.appendChild(el);
});

}

function closeMemory(){
document.getElementById("scrapbook").style.display="none";
document.getElementById("wall").style.display="block";
}

</script>

</body>
</html>
