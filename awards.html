<!DOCTYPE html>
<html>
<head>
<title>Akash Awards 2026</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: #000;
    overflow-x: hidden;
}



/* 🏆 TITLE */
h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 42px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

/* 🏅 AWARDS */
.container {
    display: grid;
    grid-template-columns: repeat(3, 260px);
    gap: 25px;
    justify-content: center;
    margin-top: 60px;
}

/* 🪄 CARDS */
.card {
    width: 260px;
    padding: 18px;
    border-radius: 14px;
    background: rgba(255,215,0,0.06);
    border: 1px solid gold;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(255,215,0,0.15);
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px gold;
}

button {
    margin-top: 12px;
    padding: 10px 14px;
    background: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

/* 🎉 CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    pointer-events: none;
}

@keyframes burstLeft {
    to {
        transform: translate(-200px, -80px) rotate(720deg);
        opacity: 0;
    }
}

@keyframes burstRight {
    to {
        transform: translate(200px, -80px) rotate(720deg);
        opacity: 0;
    }
}

/* 📸 FLASH OVERLAY */
#flashLayer {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}
</style>
</head>

<body>

<h1>🏆 Akash Awards 2026 🎬</h1>

<!-- 📸 FLASH LAYER -->
<div id="flashLayer"></div>

<!-- 🔊 CAMERA SOUND -->
<audio id="cameraSound" src="camera-click.mp3" preload="auto"></audio>

<!-- 🏅 AWARDS -->
<div class="container">

    <div class="card" id="card1">
        <h3>🏆 Best Boyfriend</h3>
        <button onclick="playAward('award1','card1')">Reveal</button>
        <audio id="award1" src="award1.mp3"></audio>
    </div>

    <div class="card" id="card2">
        <h3>🏆 Mood Lifter</h3>
        <button onclick="playAward('award2','card2')">Reveal</button>
        <audio id="award2" src="award2.mp3"></audio>
    </div>

    <div class="card" id="card3">
        <h3>🏆 Luckiest Boyfriend</h3>
        <button onclick="playAward('award3','card3')">Reveal</button>
        <audio id="award3" src="award3.mp3"></audio>
    </div>
    <div class="card" id="card4">
    <h3>🏆 Best Smile</h3>
    <button onclick="playAward('award4','card4')">Reveal</button>
    <audio id="award4" src="award4.mp3"></audio>
</div>

<div class="card" id="card5">
    <h3>🏆 Cutest Human</h3>
    <button onclick="playAward('award5','card5')">Reveal</button>
    <audio id="award5" src="award5.mp3"></audio>
</div>

<div class="card" id="card6">
    <h3>🏆 Best Hug Provider</h3>
    <button onclick="playAward('award6','card6')">Reveal</button>
    <audio id="award6" src="award6.mp3"></audio>
</div>

<div class="card" id="card7">
    <h3>🏆 Greenest Flag</h3>
    <button onclick="playAward('award7','card7')">Reveal</button>
    <audio id="award7" src="award7.mp3"></audio>
</div>

<div class="card" id="card8">
    <h3>🏆 Professional Yapster</h3>
    <button onclick="playAward('award8','card8')">Reveal</button>
    <audio id="award8" src="award8.mp3"></audio>
</div>

<div class="card" id="card9">
    <h3>🏆 Love Of My Life</h3>
    <button onclick="playAward('award9','card9')">Reveal</button>
    <audio id="award9" src="award9.mp3"></audio>
</div>

</div>




<script>

/* 📸 OPENING FLASH + CAMERA SOUND */
window.onload = function () {
    const flashLayer = document.getElementById("flashLayer");
    const cameraSound = document.getElementById("cameraSound");

    let running = true;

    function flashOnce() {
        // 📸 flash
        flashLayer.style.opacity = "1";

        setTimeout(() => {
            flashLayer.style.opacity = "0";
        }, 70); // shorter = sharper camera flash

        // 🔊 FIX: force crisp short click behavior
        try {
            cameraSound.pause();       // stop any overlap
            cameraSound.currentTime = 0;
            cameraSound.volume = 0.7;
            cameraSound.play().catch(() => {});
        } catch (e) {}
    }

    // 🎬 LONGER + MORE REALISTIC BURST SEQUENCE
    let totalDuration = 5000; // 5 seconds of paparazzi chaos
    let start = Date.now();

    function burstLoop() {
        if (!running) return;

        let now = Date.now();
        if (now - start > totalDuration) {
            running = false;
            return;
        }

        flashOnce();

        // 🔥 irregular timing = REAL camera crowd feel
        let delay = 80 + Math.random() * 120;

        setTimeout(burstLoop, delay);
    }

    burstLoop();
};


/* 🏆 AWARD CONFETTI (UNCHANGED) */
function playAward(audioId, cardId) {

    document.getElementById(audioId).play();

    let card = document.getElementById(cardId);

    for (let i = 0; i < 20; i++) {

        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = "50%";
        confetti.style.top = "50%";

        let size = Math.random() * 8 + 4;
        confetti.style.width = size + "px";
        confetti.style.height = size + "px";

        if (i % 2 === 0) {
            confetti.style.animation =
                `burstLeft ${0.8 + Math.random()}s forwards`;
        } else {
            confetti.style.animation =
                `burstRight ${0.8 + Math.random()}s forwards`;
        }

        card.appendChild(confetti);

        setTimeout(() => confetti.remove(), 2000);
    }
}

</script>

</body>
</html>
