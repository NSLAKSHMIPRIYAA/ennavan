<!DOCTYPE html>
<html>
<head>
<title>Akash Awards 2026</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: radial-gradient(circle at center, #111 0%, #000 70%);
    overflow: hidden;
}

/* 🎭 FULL STAGE BACKDROP */
.stage-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(circle at 50% 20%, rgba(255,255,200,0.08), transparent 40%),
        linear-gradient(to top, #120b06, #000 70%);
}

/* 🎤 SMALL MIC (now decorative, not layout-breaking) */
.mic {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 50px;
    opacity: 0.6;
    filter: drop-shadow(0 0 10px gold);
}

/* 💡 MOVING SPOTLIGHT */
.spotlight {
    position: fixed;
    top: -30%;
    left: 50%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(255,255,200,0.18), transparent 60%);
    transform: translateX(-50%);
    animation: swing 5s infinite ease-in-out;
    pointer-events: none;
    z-index: 0;
}

@keyframes swing {
    0% { transform: translateX(-50%) rotate(-12deg); }
    50% { transform: translateX(-50%) rotate(12deg); }
    100% { transform: translateX(-50%) rotate(-12deg); }
}

/* 🏆 TITLE */
h1 {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 40px;
    font-size: 42px;
    color: gold;
    text-shadow: 0 0 25px gold;
}

/* 🏅 AWARDS FLOATING CENTER STAGE */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 80px;
    flex-wrap: wrap;
}

/* 🪄 CARDS BECOME "SPOTLIGHT OBJECTS" */
.card {
    width: 260px;
    padding: 18px;
    border-radius: 16px;
    background: rgba(255,215,0,0.08);
    border: 1px solid gold;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 25px rgba(255,215,0,0.2);
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-12px) scale(1.03);
    box-shadow: 0 0 35px gold;
}

button {
    margin-top: 12px;
    padding: 10px 14px;
    background: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

/* 🎉 CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    animation: fall 1s ease-out forwards;
}

@keyframes fall {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(200px); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🌌 BACKDROP -->
<div class="stage-bg"></div>
<div class="spotlight"></div>

<h1>🏆 Akash Awards 2026 🎬</h1>

<!-- 🏅 AWARDS (CENTER FOCUS) -->
<div class="container">

    <div class="card" id="card1">
        <h3>🏆 Best Boyfriend</h3>
        <button onclick="playAward('award1','card1')">Reveal</button>
        <audio id="award1" src="award1.mp3"></audio>
    </div>

    <div class="card" id="card2">
        <h3>🏆 Mood Lifter</h3>
        <button onclick="playAward('award2','card2')">Reveal</button>
        <audio id="award2" src="award2.mp3"></audio>
    </div>

    <div class="card" id="card3">
        <h3>🏆 Luckiest Boyfriend</h3>
        <button onclick="playAward('award3','card3')">Reveal</button>
        <audio id="award3" src="award3.mp3"></audio>
    </div>

</div>

<!-- 🎤 MIC (NOW SUBTLE DECOR) -->
<div class="mic">🎤</div>

<script>
function playAward(audioId, cardId) {
    document.getElementById(audioId).play();

    let card = document.getElementById(cardId);

    for (let i = 0; i < 18; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "%";
        confetti.style.top = "40%";

        card.appendChild(confetti);

        setTimeout(() => confetti.remove(), 1000);
    }
}
</script>

</body>
</html>
