<!DOCTYPE html>
<html>
<head>
<title>Akash Awards 2026</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: radial-gradient(circle at center, #111 0%, #000 70%);
    overflow-x: hidden;
}

/* 🎭 STAGE FLOOR */
.stage {
    position: relative;
    width: 100%;
    height: 250px;
    background: linear-gradient(to top, #2b1b0f, #000);
    border-top: 3px solid gold;
    box-shadow: 0 -10px 40px rgba(255,215,0,0.2);
}

/* 🎤 MIC */
.mic {
    position: absolute;
    left: 50%;
    top: 40px;
    transform: translateX(-50%);
    font-size: 60px;
    filter: drop-shadow(0 0 10px gold);
}

/* 💡 SPOTLIGHT */
.spotlight {
    position: fixed;
    top: -50%;
    left: 50%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,200,0.15), transparent 60%);
    transform: translateX(-50%);
    animation: swing 4s infinite ease-in-out;
    pointer-events: none;
}

@keyframes swing {
    0% { transform: translateX(-50%) rotate(-10deg); }
    50% { transform: translateX(-50%) rotate(10deg); }
    100% { transform: translateX(-50%) rotate(-10deg); }
}

/* 🏆 TITLE */
h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 40px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

/* 🏅 AWARD CARDS ON STAGE */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    width: 250px;
    padding: 18px;
    border-radius: 15px;
    background: rgba(255,215,0,0.07);
    border: 1px solid gold;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px gold;
}

button {
    margin-top: 10px;
    padding: 10px 14px;
    background: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

/* 🎉 CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    animation: fall 1s ease-out forwards;
}

@keyframes fall {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(180px); opacity: 0; }
}
</style>
</head>

<body>

<div class="spotlight"></div>

<h1>🏆 Akash Awards 2026 🎬</h1>

<!-- 🎭 STAGE -->
<div class="stage">
    <div class="mic">🎤</div>
</div>

<!-- 🏅 AWARDS ON STAGE -->
<div class="container">

    <div class="card" id="card1">
        <h3>🏆 Best Boyfriend</h3>
        <button onclick="playAward('award1','card1')">Reveal</button>
        <audio id="award1" src="award1.mp3"></audio>
    </div>

    <div class="card" id="card2">
        <h3>🏆 Mood Lifter</h3>
        <button onclick="playAward('award2','card2')">Reveal</button>
        <audio id="award2" src="award2.mp3"></audio>
    </div>

    <div class="card" id="card3">
        <h3>🏆 Luckiest Boyfriend</h3>
        <button onclick="playAward('award3','card3')">Reveal</button>
        <audio id="award3" src="award3.mp3"></audio>
    </div>

</div>

<script>
function playAward(audioId, cardId) {
    document.getElementById(audioId).play();

    let card = document.getElementById(cardId);

    for (let i = 0; i < 15; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "%";
        confetti.style.top = "50%";

        card.appendChild(confetti);

        setTimeout(() => confetti.remove(), 1000);
    }
}
</script>

</body>
</html>
